<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>끌리메 근무인원 현황판</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Pretendard","Noto Sans KR",-apple-system,sans-serif; background:#F0F2F5; padding:20px; color:#1a1a2e; }

.header { background:#fff; border-radius:12px; padding:20px 28px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,.08); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
.header h1 { font-size:20px; font-weight:800; }
.header-right { display:flex; align-items:center; gap:16px; }
.meta { font-size:13px; color:#888; }
.refresh-btn { padding:7px 16px; background:#4F46E5; color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:background .15s; }
.refresh-btn:hover { background:#4338CA; }
.status { font-size:12px; color:#aaa; }

.summary { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
.card { border-radius:10px; padding:14px 18px; box-shadow:0 2px 6px rgba(0,0,0,.08); flex:1; min-width:100px; }
.card .label { font-size:11px; font-weight:600; opacity:.8; margin-bottom:4px; letter-spacing:.3px; }
.card .val   { font-size:24px; font-weight:800; }
.card-total  { background:#4F46E5; color:#fff; }

.table-wrap { background:#fff; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.08); overflow:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { background:#1a1a2e; color:#fff; padding:10px 8px; font-weight:600; white-space:nowrap; position:sticky; top:0; z-index:1; }
td { padding:8px 6px; border-bottom:1px solid #F0F0F0; vertical-align:top; }
tr:hover td { background:#FAFBFF !important; }

.branch-name { font-weight:700; white-space:nowrap; font-size:13px; }
.total-cell  { text-align:center; font-weight:800; font-size:15px; color:#4F46E5; }
.belt-cell   { min-width:90px; }

.emp-tag { display:block; font-size:11px; line-height:1.7; white-space:nowrap; }

.total-row td { font-weight:700; border-top:3px solid #4F46E5; }

.loading { text-align:center; padding:60px; color:#aaa; font-size:16px; }
.error   { text-align:center; padding:60px; color:#EF4444; font-size:15px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🌸 끌리메 근무인원 현황판</h1>
    <div class="meta" id="meta-info">데이터 로딩 중...</div>
  </div>
  <div class="header-right">
    <div class="status" id="last-updated"></div>
    <button class="refresh-btn" onclick="loadData()">↻ 새로고침</button>
  </div>
</div>

<div class="summary" id="summary"></div>
<div class="table-wrap" id="table-wrap">
  <div class="loading">⏳ 구글 시트에서 데이터를 가져오는 중...</div>
</div>

<script>
const SHEET_ID = '1kXGHbBBIAIXoNkXbEXzck0oKGF9RYQddhO279HociSo';
const GID      = '0';

const BELT_ORDER  = ['골드','실버','블랙','레드','블루','퍼플','옐로우','화이트','실습생'];
const BELT_STYLES = {
  '골드':   { bg:'#FFF3CD', fg:'#856404' },
  '실버':   { bg:'#E2E3E5', fg:'#383D41' },
  '블랙':   { bg:'#343A40', fg:'#FFFFFF' },
  '레드':   { bg:'#F8D7DA', fg:'#721C24' },
  '블루':   { bg:'#CCE5FF', fg:'#004085' },
  '퍼플':   { bg:'#E8D5F5', fg:'#5B2C8D' },
  '옐로우': { bg:'#FFF9C4', fg:'#6D5500' },
  '화이트': { bg:'#EEEEEE', fg:'#333333' },
  '실습생': { bg:'#D4EDDA', fg:'#155724' },
};

/* ───── 날짜 파싱: "Date(2024,2,15)" 또는 "2024. 3. 15." 등 ───── */
function parseDate(cell) {
  if (!cell) return '';
  if (cell.v && typeof cell.v === 'string') {
    const m = cell.v.match(/Date\((\d{4}),(\d{1,2})/);
    if (m) return `${m[1]}.${String(parseInt(m[2]) + 1).padStart(2,'0')}`;
  }
  const src = (cell.f || '') + ' ' + (typeof cell.v === 'string' ? cell.v : '');
  const m = src.match(/(\d{4})[.\-\s\/]+(\d{1,2})/);
  if (m) return `${m[1]}.${String(m[2]).padStart(2,'0')}`;
  return '';
}

/* ───── Google이 callback 파라미터를 무시하므로 네임스페이스 직접 정의 ───── */
window.google = window.google || {};
window.google.visualization = window.google.visualization || {};
window.google.visualization.Query = window.google.visualization.Query || {};
window.google.visualization.Query.setResponse = function(resp) { onData(resp); };

/* ───── GViz 로드 ───── */
function loadData() {
  document.getElementById('last-updated').textContent = '로딩 중...';
  const old = document.getElementById('_gviz');
  if (old) old.remove();
  const s = document.createElement('script');
  s.id  = '_gviz';
  s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&_=${Date.now()}`;
  s.onerror = () => {
    document.getElementById('table-wrap').innerHTML =
      '<div class="error">❌ 구글 시트 연결 실패. 시트가 공개 상태인지 확인하세요.</div>';
    document.getElementById('last-updated').textContent = '연결 실패';
  };
  document.head.appendChild(s);
}

/* ───── 데이터 수신 콜백 ───── */
function onData(resp) {
  try {
    if (!resp || resp.status !== 'ok') throw new Error('응답 오류');
    const cols = resp.table.cols;
    const rows = resp.table.rows;

    /* 컬럼 인덱스 탐색 — cols 라벨 먼저 확인 */
    let iB=-1,iN=-1,iR=-1,iL=-1,iD=-1;
    const findIdx = (row) => {
      (row||[]).forEach((c,i) => {
        const t = String(c?.label ?? c?.v ?? c?.f ?? '').trim();
        if (t==='지점') iB=i;
        else if (t==='이름') iN=i;
        else if (t==='직무'||t==='직급') iR=i;
        else if (t==='벨트'||t==='등급') iL=i;
        else if (t==='입사일'||t.includes('입사')) iD=i;
      });
    };
    findIdx(cols);

    /* cols에서 못 찾으면 첫 5행에서 헤더 행 탐색 */
    let dataStart = 0;
    if (iB<0 || iN<0) {
      for (let ri=0; ri<Math.min(rows.length,5); ri++) {
        const cells = (rows[ri].c||[]).map(c=>({label: String(c?.f||c?.v||'').trim()}));
        iB=-1; iN=-1; iR=-1; iL=-1; iD=-1;
        findIdx(cells);
        if (iB>=0 && iN>=0) { dataStart=ri+1; break; }
      }
    }

    /* 그래도 못 찾으면 위치 기반 기본값 (지점=1, 이름=2, 직무=3, 벨트=4) */
    if (iB<0) iB=1; if (iN<0) iN=2; if (iR<0) iR=3; if (iL<0) iL=4;

    const getStr = (row,i) => (i>=0 && row.c && row.c[i]) ? String(row.c[i].f||row.c[i].v||'').trim() : '';

    /* 직원 파싱 */
    const employees = [];
    rows.slice(dataStart).forEach(row => {
      const branch = getStr(row, iB);
      const name   = getStr(row, iN);
      const role   = getStr(row, iR);
      const belt   = getStr(row, iL);
      const dateStr= iD>=0 ? parseDate(row.c && row.c[iD]) : '';
      if (!branch || !name) return;
      employees.push({ branch, name, role, belt, dateStr });
    });

    render(employees);

    const now = new Date();
    document.getElementById('last-updated').textContent =
      `마지막 업데이트: ${now.toLocaleTimeString('ko-KR')}`;
  } catch(e) {
    document.getElementById('table-wrap').innerHTML =
      `<div class="error">❌ 데이터 파싱 오류: ${e.message}</div>`;
  }
}

/* ───── 렌더링 ───── */
function render(employees) {
  const today = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
  document.getElementById('meta-info').innerHTML =
    `기준일: <strong>${today}</strong> &nbsp;|&nbsp; 재직자 합계: <strong>${employees.length}명</strong>`;

  /* 지점 정렬 */
  const branchOrder = {};
  employees.forEach(e => {
    if (!(e.branch in branchOrder)) {
      const n = parseInt(e.branch) || 99;
      branchOrder[e.branch] = n;
    }
  });
  const branches = Object.keys(branchOrder).sort((a,b) => branchOrder[a]-branchOrder[b]);

  /* 집계 */
  const data = {};
  branches.forEach(b => { data[b]={}; BELT_ORDER.forEach(l => data[b][l]=[]); });
  employees.forEach(e => {
    const belt = BELT_ORDER.includes(e.belt) ? e.belt : '실습생';
    const role = e.role.includes('매니저') ? 'M' : 'B';
    const tag  = [e.dateStr, e.name, role].filter(Boolean).join('.');
    data[e.branch][belt].push(tag);
  });

  /* 벨트 총계 */
  const beltTotals = {};
  BELT_ORDER.forEach(l => { beltTotals[l] = employees.filter(e => (BELT_ORDER.includes(e.belt)?e.belt:'실습생') === l).length; });

  /* 요약 카드 */
  let summaryHtml = `<div class="card card-total"><div class="label">전체</div><div class="val">${employees.length}</div></div>`;
  BELT_ORDER.forEach(belt => {
    if (!beltTotals[belt]) return;
    const s = BELT_STYLES[belt] || {bg:'#eee',fg:'#333'};
    summaryHtml += `<div class="card" style="background:${s.bg};color:${s.fg}">
      <div class="label">${belt}</div>
      <div class="val">${beltTotals[belt]}</div>
    </div>`;
  });
  document.getElementById('summary').innerHTML = summaryHtml;

  /* 테이블 헤더 */
  const beltHeaders = BELT_ORDER.map(belt => {
    const s = BELT_STYLES[belt]||{bg:'#555',fg:'#fff'};
    return `<th><span style="background:${s.bg};color:${s.fg};padding:2px 8px;border-radius:8px;font-size:11px">${belt}</span></th>`;
  }).join('');

  /* 테이블 행 */
  let bodyHtml = '';
  branches.forEach((branch, idx) => {
    const branchTotal = BELT_ORDER.reduce((s,l)=>s+data[branch][l].length, 0);
    const rowBg = idx%2===0 ? '#FAFAFA' : '#FFFFFF';
    const beltCells = BELT_ORDER.map(belt => {
      const list = data[branch][belt];
      const s    = BELT_STYLES[belt]||{bg:'#fff',fg:'#333'};
      if (!list.length) return `<td class="belt-cell" style="background:#fff;color:#ddd;text-align:center">-</td>`;
      const tags = list.map(t => `<span class="emp-tag" style="color:${s.fg}">${t}</span>`).join('');
      return `<td class="belt-cell" style="background:${s.bg}">${tags}</td>`;
    }).join('');

    bodyHtml += `<tr style="background:${rowBg}">
      <td style="text-align:center;color:#aaa;font-size:12px">${idx+1}</td>
      <td class="branch-name">${branch}</td>
      <td class="total-cell">${branchTotal}</td>
      ${beltCells}
    </tr>`;
  });

  /* 합계 행 */
  const totalCells = BELT_ORDER.map(belt => {
    const s = BELT_STYLES[belt]||{bg:'#eee',fg:'#333'};
    return `<td style="background:${s.bg};color:${s.fg};text-align:center;font-weight:800;font-size:14px">${beltTotals[belt]||'-'}</td>`;
  }).join('');

  document.getElementById('table-wrap').innerHTML = `
  <table>
    <thead><tr>
      <th>No.</th><th>지점</th><th>합계</th>${beltHeaders}
    </tr></thead>
    <tbody>
      ${bodyHtml}
      <tr class="total-row" style="background:#F8F8FF">
        <td colspan="2" style="text-align:center;font-weight:800">합계</td>
        <td class="total-cell">${employees.length}</td>
        ${totalCells}
      </tr>
    </tbody>
  </table>`;
}

/* ───── 초기 로드 + 5분마다 자동 갱신 ───── */
loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
